<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160">
  <!-- Outlined T frame, sized to cap-height, sits flush against wordmark -->
  <g transform="translate(70, 80)" fill="none" stroke="#0F3D2E" stroke-width="6" stroke-linejoin="miter">
    <path d="M -38 -36 L 38 -36 L 38 -18 L 12 -18 L 12 36 L -12 36 L -12 -18 L -38 -18 Z"/>
  </g>
  <!-- Flag and stick inside the T's vertical stem -->
  <g transform="translate(70, 80)" fill="#0F3D2E">
    <rect x="-1" y="-13" width="2" height="44"/>
    <path d="M 1 -13 L 10 -8 L 1 -3 Z"/>
  </g>
  <!-- Wordmark "eeAhead" -->
  <text x="116" y="106"
        font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="80"
        font-weight="700"
        fill="#0F3D2E"
        letter-spacing="-0.04em">eeAhead</text>
</svg>
